name: Sync gh-pages with main

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to gh-pages
        run: |
          git push origin HEAD:refs/heads/gh-pages --force